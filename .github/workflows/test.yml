name: "Tests"

on:
  push:
    branches:
      - "main"
      - "[0-9].*"
  pull_request:

concurrency:
  group: tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  phpunit:
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]

    name: "PHP ${{ matrix.php }}"
    runs-on: "ubuntu-latest"

    env:
      extensions: curl, fileinfo, gd, mbstring, pdo, pdo_sqlite, sqlite3
      key: mugshot-cache-develop

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Setup extension cache"
        id: ext-cache
        uses: "shivammathur/cache-extensions@v1"
        with:
          php-version: "${{ matrix.php }}"
          extensions: "${{ env.extensions }}"
          key: "${{ env.key }}"

      - name: "Cache extensions"
        uses: "actions/cache@v4"
        with:
          path: "${{ steps.ext-cache.outputs.dir }}"
          key: "${{ steps.ext-cache.outputs.key }}"
          restore-keys: "${{ steps.ext-cache.outputs.key }}"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php }}"
          extensions: "${{ env.extensions }}"
          tools: "composer:v2"
          coverage: "none"

      - name: "Get composer cache directory"
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: "Cache dependencies"
        uses: "actions/cache@v4"
        with:
          path: "${{ steps.composer-cache.outputs.dir }}"
          key: "composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.*') }}"
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-
            composer-

      - name: "Install Composer dependencies"
        run: "composer install --no-interaction --no-progress --optimize-autoloader --no-scripts"

      - name: "Run Tests"
        run: "./vendor/bin/phpunit"
